# Local Development Configuration
# Usage: APP_ENV=local
# No external dependencies needed — mock services fallback automatically
env: local
server:
  port: 8080
  mode: debug
database:
  host: localhost
  port: 3306
  name: agent_infra
  user: root
  password: ""
redis:
  host: localhost
  port: 6379
  db: 0
log:
  level: debug
  format: text
