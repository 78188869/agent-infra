# Local Development Configuration
# Usage: APP_ENV=local make local
# No external dependencies needed — SQLite + miniredis (in-memory Redis)
env: local
server:
  port: 8080
  mode: debug
database:
  driver: sqlite
  name: data/agent_infra.db
redis:
  host: localhost
  port: 6379
  db: 0
log:
  level: debug
  format: text
  outputs: both
  file:
    dir: logs
    max_size_mb: 100
    max_backups: 7
    max_age_days: 30
