apiVersion: v1
kind: Secret
metadata:
  name: control-plane-secret
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
type: Opaque
stringData:
  # Database credentials
  DB_USER: "agent_infra"
  DB_PASSWORD: "CHANGE_ME"

  # Redis credentials
  REDIS_PASSWORD: "CHANGE_ME"

  # SLS credentials
  SLS_ACCESS_KEY: "CHANGE_ME"
  SLS_ACCESS_SECRET: "CHANGE_ME"

  # Git token for repository access
  GIT_TOKEN: "CHANGE_ME"
