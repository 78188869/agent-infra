apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-infra
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-infra
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: registry.example.com/agent-infra/control-plane:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: control-plane-config
            - secretRef:
                name: control-plane-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: agent-infra
                    app.kubernetes.io/component: control-plane
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane
  namespace: sandbox
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane
  namespace: sandbox
  labels:
    app.kubernetes.io/name: agent-infra
    app.kubernetes.io/component: control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: control-plane
